services:
  fiagram_mysql:
    image: mysql:9.5.0
    container_name: fiagram_mysql-0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fiagram
    volumes:
      - fiagram_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  fiagram_redis:
    image: redis:8.4.0
    container_name: fiagram_redis-0
    restart: always

  fiagram_standalone:
    build: ../standalone
    container_name: fiagram_standalone-0
    restart: always
    ports:
      - "11000:11000"
    volumes:
      - ./configs/standalone.yaml:/home/standalone.yaml:ro
    command: /standalone -c /home/standalone.yaml
    depends_on:
      fiagram_mysql:
        condition: service_healthy
      fiagram_redis:
        condition: service_started

  fiagram_web_server:
    build: ../web_server
    container_name: fiagram_web_server-0
    restart: always
    env_file:
      - ../web_server/.env
    ports:
      - "12000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      fiagram_standalone:
        condition: service_started

volumes:
  fiagram_mysql_data:

networks:
  default:
    name: fiagram_network
