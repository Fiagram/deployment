http:
  address: 0.0.0.0
  port: 11000
  CORS:
    isEnable: true
    allowOrigins:
      - "https://fiagram.io.vn"
    allowMethods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowHeaders:
      - Origin
      - Content-Type
      - Authorization
    exposeHeaders:
      - Content-Length
    allowCredentials: true
    maxAge: 12h
  cookie:
    domain: fiagram.io.vn
    path: "/"
    sameSite: none
    secure: true
    httpOnly: true

auth:
  hash:
    cost: 10
  token:
    secret: secret_token_in_here
    accessTokenTTL: 15m
    refreshTokenTTL: 24h
    refreshTokenLongTTL: 720h

log:
  level: debug

database_client:
  type: mysql
  address: fiagram_mysql-0
  port: 3306
  username: root
  password: root
  database: fiagram

cache_client:
  type: redis
  address: fiagram_redis-0
  port: 6379
  username:
  password:
